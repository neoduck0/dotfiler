general {
    hide_cursor = true
}

auth {
    pam {
        enabled = true
    }
}

animations {
    enabled = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

input-field {
    monitor =

    size = 290, 45
    outline_thickness = 2
    dots_size = 0.2

    outer_color = 0xffC1C1C1
    inner_color = 0xff000000

    font_color = 0xffC1C1C1
    font_family = JetBrainsMono Nerd Font Mono

    placeholder_text = Password

    rounding = 0

    check_color = 0xff7CB342
    fail_color = 0xfff97583
    fail_text = Authentication Failed
    capslock_color = 0xffffab70
    numlock_color = 0xffC1C1C1
    bothlock_color = 0xffffab70

    halign = center
    valign = center
}
